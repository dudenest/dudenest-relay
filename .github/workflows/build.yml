name: Build Relay Binaries

on:
  push:
    branches: [main, feat/storage-replica]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, feat/storage-replica]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Test on native Go (github-hosted)
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: "*"
      GOFLAGS: "-mod=mod"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Configure git auth for Go modules
        run: git config --global url."https://${{ github.token }}@github.com/".insteadOf "https://github.com/"
      - name: Download dependencies
        run: go mod tidy
      - name: Run tests
        run: go test ./... -v -race

  # ─────────────────────────────────────────────
  # Cross-compile for all target platforms
  # ─────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: "*"
      GOFLAGS: "-mod=mod"
    strategy:
      matrix:
        include:
          - {goos: linux,   goarch: amd64,  goarm: "",  artifact: relay-linux-amd64,       desc: "Linux x86_64 (VM, VPS, Desktop)"}
          - {goos: linux,   goarch: arm64,  goarm: "",  artifact: relay-linux-arm64,       desc: "Linux ARM64 (Raspberry Pi 4/5, Apple Silicon VM)"}
          - {goos: linux,   goarch: arm,    goarm: "7", artifact: relay-linux-armv7,       desc: "Linux ARMv7 (Raspberry Pi 3B, Zero 2W)"}
          - {goos: darwin,  goarch: amd64,  goarm: "",  artifact: relay-darwin-amd64,      desc: "macOS Intel"}
          - {goos: darwin,  goarch: arm64,  goarm: "",  artifact: relay-darwin-arm64,      desc: "macOS Apple Silicon"}
          - {goos: windows, goarch: amd64,  goarm: "",  artifact: relay-windows-amd64.exe, desc: "Windows x86_64"}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Configure git auth for Go modules
        run: git config --global url."https://${{ github.token }}@github.com/".insteadOf "https://github.com/"
      - name: Download dependencies
        run: go mod tidy
      - name: Build ${{ matrix.desc }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"  # static binary, no CGO deps (SQLite via pure-go driver for cross-compile)
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X main.Commit=${{ github.sha }}" \
            -o dist/${{ matrix.artifact }} \
            ./cmd/relay/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  # ─────────────────────────────────────────────
  # Docker multi-arch image (amd64 + arm64 + armv7)
  # ─────────────────────────────────────────────
  docker:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dudenest/dudenest-relay
          tags: |
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Deploy amd64 binary to relay-poc (main only)
  # Requires: SSH_RELAY_KEY secret (private key for root@10.51.1.101 + root@192.168.0.119)
  # ─────────────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, netol-swarm]  # self-hosted runner on NETOL network — can reach 192.168.0.x directly
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: relay-linux-amd64
          path: dist/

      - name: Deploy to relay-poc via ZeroTier (DooD)
        run: |
          # 1. Prepare SSH keys and config
          mkdir -p .ssh
          echo "${{ secrets.SSH_RELAY_KEY }}" > .ssh/id_relay
          chmod 600 .ssh/id_relay
          cat >> .ssh/known_hosts << 'EOF'
          |1|2m6MVnuf0Zuf3z/RKz3kX2uGmXA=|dJK/G7F0JhxEfZVd9408bh1gtZY= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEYudfc8afzLb6qXA+tk4LDHB5aTfxFDiuCDOYBzj9x51e13i+34+vWj4UbUd/8vNLezNrJ/B9Ojl+9B2xhG9F0=
          |1|THiiAf+rjQVEYdOsks3Dw0Ai4+s=|9jZt5ZpfcTLviRKU1O6Y03j5d3w= ssh-rsa 
          |1|TFYULGsoqG5PC+G2EVhFoc3wXdY=|YC/txGdEda105b0uhOFnCTcb8+c= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILOMuMu0FwC7XN/zMLMQXAjyOyP1ovyTFwa/gM0kBgt8
          EOF
          chmod 644 .ssh/known_hosts

          # 2. Create a temporary container (network host) with UNIQUE name
          DEPLOYER="deployer-${{ github.run_id }}-${{ github.run_attempt }}"
          docker rm -f $DEPLOYER 2>/dev/null || true
          docker create --name $DEPLOYER --network host alpine:latest sleep 300
          
          # 3. Copy artifacts and SSH keys into the container
          docker cp dist $DEPLOYER:/dist
          docker cp .ssh $DEPLOYER:/root/.ssh
          
          # 4. Run the deployment commands inside the container
          docker start $DEPLOYER
          docker exec $DEPLOYER sh -c "
            apk add --no-cache openssh-client && \
            chmod 600 /root/.ssh/id_relay && \
            cat > /root/.ssh/config << 'SEC'
            Host 10.51.1.101 192.168.0.119
              IdentityFile /root/.ssh/id_relay
              UserKnownHostsFile /root/.ssh/known_hosts
              StrictHostKeyChecking yes
            SEC
            chmod 600 /root/.ssh/config && \
            chmod +x /dist/relay-linux-amd64 && \
            scp -o ProxyJump=root@10.51.1.101 /dist/relay-linux-amd64 root@192.168.0.119:/tmp/relay-new && \
            ssh -o ProxyJump=root@10.51.1.101 root@192.168.0.119 'mv /tmp/relay-new /usr/local/bin/relay && systemctl restart relay.service && systemctl is-active relay.service'
          "
          
          # 5. Cleanup
          docker rm -f $DEPLOYER

  # ─────────────────────────────────────────────
  # GitHub Release with all binaries (tags only)
  # ─────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist/
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/relay-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
